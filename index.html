<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word color translator</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&family=DM+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F7F5F0;
      --surface: #FFFFFF;
      --border: rgba(0,0,0,0.08);
      --border-strong: rgba(0,0,0,0.14);
      --text-primary: #1A1916;
      --text-secondary: #6B6860;
      --text-tertiary: #A09D98;
      --radius-card: 16px;
      --radius-sm: 8px;
      --font-display: 'DM Serif Display', serif;
      --font-body: 'DM Sans', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--font-body);
      min-height: 100vh;
      padding: 0 0 80px;
    }

    /* Header */
    header {
      padding: 56px 32px 40px;
      max-width: 720px;
      margin: 0 auto;
    }

    header h1 {
      font-family: var(--font-display);
      font-size: clamp(32px, 5vw, 48px);
      font-weight: 400;
      letter-spacing: -0.5px;
      line-height: 1.15;
      color: var(--text-primary);
      margin-bottom: 10px;
    }

    header p {
      font-size: 15px;
      color: var(--text-secondary);
      font-weight: 300;
      line-height: 1.6;
      max-width: 480px;
    }

    /* Input area */
    .input-section {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 32px 32px;
    }

    .input-wrap {
      display: flex;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-card);
      padding: 8px 8px 8px 20px;
      transition: box-shadow 0.2s;
    }

    .input-wrap:focus-within {
      box-shadow: 0 0 0 3px rgba(0,0,0,0.06);
      border-color: rgba(0,0,0,0.22);
    }

    .input-wrap input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-family: var(--font-body);
      font-size: 16px;
      font-weight: 400;
      color: var(--text-primary);
      min-width: 0;
    }

    .input-wrap input::placeholder { color: var(--text-tertiary); }

    .input-wrap button {
      background: var(--text-primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 22px;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    .input-wrap button:hover { opacity: 0.82; }
    .input-wrap button:active { transform: scale(0.97); }

    /* Hint chips */
    .hints {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-top: 12px;
    }

    .hint-chip {
      font-size: 12px;
      font-weight: 400;
      color: var(--text-secondary);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      user-select: none;
    }

    .hint-chip:hover { border-color: var(--border-strong); color: var(--text-primary); }

    /* Palette */
    .palette {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 32px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Card */
    .card {
      display: flex;
      align-items: stretch;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      overflow: hidden;
      animation: rise 0.3s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .swatch {
      width: 80px;
      flex-shrink: 0;
      position: relative;
    }

    .card-body {
      flex: 1;
      padding: 16px 18px;
      min-width: 0;
    }

    .card-word {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 400;
      color: var(--text-primary);
      margin-bottom: 4px;
      text-transform: lowercase;
    }

    .card-hex {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 8px;
      letter-spacing: 0.02em;
      cursor: pointer;
      display: inline-block;
      padding: 2px 6px;
      border-radius: 4px;
      transition: background 0.15s, color 0.15s;
    }
    .card-hex:hover { background: var(--bg); color: var(--text-primary); }
    .card-hex.ok { color: #1A6B40; background: #D5F5E3; }

    .card-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.03em;
      text-transform: lowercase;
    }

    .card-actions {
      display: flex;
      align-items: center;
      padding: 16px;
      gap: 8px;
    }

    .copy-btn {
      font-family: var(--font-mono);
      font-size: 12px;
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-strong);
      background: transparent;
      cursor: pointer;
      color: var(--text-secondary);
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }

    .copy-btn:hover { background: var(--bg); color: var(--text-primary); }
    .copy-btn.ok { color: #1A6B40; border-color: #1A6B40; }

    .remove-btn {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-tertiary);
      font-size: 16px;
      line-height: 1;
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
    }

    .remove-btn:hover { background: #FEE2E2; color: #B91C1C; border-color: #FECACA; }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 64px 0 32px;
      color: var(--text-tertiary);
    }

    .empty-icon {
      font-size: 40px;
      margin-bottom: 12px;
      opacity: 0.4;
    }

    .empty p {
      font-size: 14px;
      line-height: 1.6;
      font-weight: 300;
    }

    /* Toolbar */
    .toolbar {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 32px 12px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      min-height: 36px;
    }

    .clear-btn {
      font-size: 12px;
      color: var(--text-tertiary);
      background: transparent;
      border: none;
      cursor: pointer;
      font-family: var(--font-body);
      padding: 4px 0;
      transition: color 0.15s;
    }

    .clear-btn:hover { color: #B91C1C; }

    .export-btn {
      font-size: 12px;
      color: var(--text-secondary);
      background: transparent;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-family: var(--font-body);
      padding: 4px 12px;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .export-btn:hover { background: var(--surface); color: var(--text-primary); border-color: rgba(0,0,0,0.22); }
    .export-btn.ok { color: #1A6B40; border-color: #1A6B40; }

    /* Define panel - shown on fallback cards */
    .define-btn {
      font-size: 11px;
      color: var(--text-tertiary);
      background: transparent;
      border: 1px dashed var(--border-strong);
      border-radius: 20px;
      padding: 3px 10px;
      cursor: pointer;
      font-family: var(--font-body);
      margin-top: 6px;
      display: inline-block;
      transition: color 0.15s, border-color 0.15s;
    }
    .define-btn:hover { color: var(--text-primary); border-color: rgba(0,0,0,0.3); border-style: solid; }

    .define-panel {
      margin-top: 10px;
      padding: 12px;
      background: var(--bg);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
    }

    .define-panel label {
      font-size: 11px;
      color: var(--text-tertiary);
      display: block;
      margin-bottom: 6px;
      text-transform: lowercase;
      letter-spacing: 0.03em;
    }

    .define-row { display: flex; gap: 6px; align-items: center; }

    .define-input {
      flex: 1;
      font-size: 13px;
      font-family: var(--font-body);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      padding: 5px 10px;
      background: var(--surface);
      color: var(--text-primary);
      outline: none;
      min-width: 0;
    }
    .define-input:focus { border-color: rgba(0,0,0,0.3); }

    .define-preview {
      width: 28px; height: 28px;
      border-radius: 6px;
      border: 1px solid var(--border);
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .define-confirm {
      font-size: 12px;
      font-family: var(--font-body);
      background: var(--text-primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 5px 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }
    .define-confirm:hover { opacity: 0.8; }
    .define-confirm:disabled { opacity: 0.35; cursor: default; }

    /* Custom categories section */
    .custom-cats-section {
      max-width: 720px;
      margin: 32px auto 0;
      padding: 0 32px;
    }

    .custom-cats-header {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-bottom: 10px;
      letter-spacing: 0.04em;
      text-transform: lowercase;
    }

    .custom-cat-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .custom-cat-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 6px 4px 10px;
      color: var(--text-secondary);
    }

    .custom-cat-swatch {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .custom-cat-remove {
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--text-tertiary);
      font-size: 14px;
      line-height: 1;
      padding: 0 2px;
      transition: color 0.15s;
    }
    .custom-cat-remove:hover { color: #B91C1C; }

    /* Responsive */
    @media (max-width: 560px) {
      header, .input-section, .palette, .toolbar { padding-left: 20px; padding-right: 20px; }
      .swatch { width: 56px; }
      .card-word { font-size: 18px; }
      .card-actions { padding: 12px 10px; gap: 6px; }
    }
  </style>
</head>
<body>

<header>
  <h1>Word color<br>translator</h1>
  <p>Type any word and see the color it emotionally carries - based on color psychology and symbolic meaning, not math.</p>
</header>

<div class="input-section">
  <div class="input-wrap">
    <input type="text" id="inp" placeholder="love, ocean, mystery, forest..." autocomplete="off" />
    <button onclick="go()">Translate</button>
  </div>
  <div class="hints">
    <span class="hint-chip" onclick="quickAdd('love')">love</span>
    <span class="hint-chip" onclick="quickAdd('grief')">grief</span>
    <span class="hint-chip" onclick="quickAdd('rage')">rage</span>
    <span class="hint-chip" onclick="quickAdd('nostalgia')">nostalgia</span>
    <span class="hint-chip" onclick="quickAdd('lonely')">lonely</span>

    <span class="hint-chip" onclick="quickAdd('silence')">silence</span>
    <span class="hint-chip" onclick="quickAdd('city')">city</span>

    <span class="hint-chip" onclick="quickAdd('dream')">dream</span>
    <span class="hint-chip" onclick="quickAdd('scent')">scent</span>
    <span class="hint-chip" onclick="quickAdd('eternal')">eternal</span>
  </div>
</div>

<div class="toolbar">
  <button class="export-btn" id="exportJsonBtn" onclick="exportJSON(this)" style="display:none;">Export JSON</button>
  <button class="export-btn" id="exportCssBtn" onclick="exportCSS(this)" style="display:none;">Export CSS</button>
  <button class="clear-btn" id="clearBtn" onclick="clearAll()" style="display:none;">Clear all</button>
</div>

<div class="palette" id="pal"></div>

<div class="custom-cats-section" id="customCatsSection" style="display:none;">
  <p class="custom-cats-header">your categories</p>
  <div class="custom-cat-list" id="customCatList"></div>
</div>

  function hslToHex(h, s, l) {
    s /= 100; l /= 100;
    const a = s * Math.min(l, 1 - l);
    const f = n => { const k = (n + h / 30) % 12; const c = l - a * Math.max(Math.min(k-3, 9-k, 1), -1); return Math.round(255*c).toString(16).padStart(2,'0'); };
    return `#${f(0)}${f(8)}${f(4)}`;
  }

  function pickHue(entry) {
    return entry.hues[Math.floor(Math.random() * entry.hues.length)];
  }

  function fallbackColor(word) {
    let h = 0;
    for (let i = 0; i < word.length; i++) h = (h * 37 + word.charCodeAt(i)) >>> 0;
    return { hex: hslToHex(h % 360, 42 + h % 22, 38 + h % 18), label: 'unique word color', tagBg: '#EBEBEB', tagText: '#555' };
  }

  let customCategories = [];

  function loadCustomCategories() {
    try { const r = localStorage.getItem('wct_custom_categories'); if (r) customCategories = JSON.parse(r); } catch(e) {}
  }

  function saveCustomCategories() {
    try { localStorage.setItem('wct_custom_categories', JSON.stringify(customCategories)); } catch(e) {}
  }

  function getCustomMatch(word) {
    const w = word.toLowerCase().trim();
    for (const cat of customCategories) {
      if (cat.words.map(x => x.toLowerCase()).includes(w)) return cat;
    }
    return null;
  }

  function getBestMatch(word) {
    const w = word.toLowerCase().trim();
    const custom = getCustomMatch(w);
    if (custom) return custom;
    for (const e of colorMap) if (e.keys.includes(w)) return e;
    for (const e of colorMap) for (const k of e.keys) if (w.includes(k) || k.includes(w)) return e;
    return null;
  }

  function suggestColorForCategory(name) {
    const match = getBestMatch(name);
    if (match) { const hex = pickHue(match); return { hex, tagBg: match.tagBg, tagText: match.tagText }; }
    const fb = fallbackColor(name);
    return { hex: fb.hex, tagBg: '#EBEBEB', tagText: '#555' };
  }

  function renderCustomCats() {
    const section = document.getElementById('customCatsSection');
    const list = document.getElementById('customCatList');
    if (!customCategories.length) { section.style.display = 'none'; return; }
    section.style.display = 'block';
    list.innerHTML = customCategories.map((cat, i) => `
      <div class="custom-cat-chip">
        <span class="custom-cat-swatch" style="background:${cat.hues[0]};"></span>
        <span>${cat.label}</span>
        <span style="color:var(--text-tertiary);font-size:11px;">(${cat.words.length} word${cat.words.length !== 1 ? 's' : ''})</span>
        <button class="custom-cat-remove" onclick="removeCustomCat(${i})" title="Remove">×</button>
      </div>
    `).join('');
  }

  function removeCustomCat(i) {
    customCategories.splice(i, 1);
    saveCustomCategories();
    renderCustomCats();
    render();
  }

  function openDefinePanel(id) {
    const panel = document.getElementById('dp-' + id);
    if (!panel) return;
    const isOpen = panel.style.display !== 'none';
    panel.style.display = isOpen ? 'none' : 'block';
    if (!isOpen) { const inp = panel.querySelector('.define-input'); if (inp) { inp.focus(); updatePreview(id); } }
  }

  function updatePreview(id) {
    const inp = document.getElementById('di-' + id);
    const preview = document.getElementById('dprev-' + id);
    const btn = document.getElementById('dconf-' + id);
    if (!inp || !preview) return;
    const val = inp.value.trim();
    if (val.length > 0) {
      const s = suggestColorForCategory(val);
      preview.style.background = s.hex;
      preview.dataset.hex = s.hex;
      preview.dataset.tagBg = s.tagBg;
      preview.dataset.tagText = s.tagText;
      if (btn) btn.disabled = false;
    } else {
      preview.style.background = 'var(--border)';
      if (btn) btn.disabled = true;
    }
  }

  function confirmCategory(id) {
    const r = results.find(x => x.id == id);
    const inp = document.getElementById('di-' + id);
    const preview = document.getElementById('dprev-' + id);
    if (!r || !inp || !preview) return;
    const label = inp.value.trim();
    if (!label) return;
    const hex = preview.dataset.hex || fallbackColor(label).hex;
    const tagBg = preview.dataset.tagBg || '#EBEBEB';
    const tagText = preview.dataset.tagText || '#555';
    const existing = customCategories.find(c => c.label.toLowerCase() === label.toLowerCase());
    if (existing) { if (!existing.words.includes(r.word.toLowerCase())) existing.words.push(r.word.toLowerCase()); }
    else { customCategories.push({ label, hues: [hex], tagBg, tagText, words: [r.word.toLowerCase()] }); }
    saveCustomCategories();
    r.hex = hex; r.label = label; r.tagBg = tagBg; r.tagText = tagText; r.isCustom = true; r.isFallback = false;
    renderCustomCats();
    render();
  }

  function copyText(text, el, original) {
    const done = () => {
      el.textContent = 'Copied!'; el.classList.add('ok');
      setTimeout(() => { el.textContent = original; el.classList.remove('ok'); }, 1500);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
    } else {
      fallbackCopy(text, done);
    }
  }

  function fallbackCopy(text, done) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); done(); } catch(e) {}
    document.body.removeChild(ta);
  }

  let _id = 1;
  const results = [];

  function go() {
    const inp = document.getElementById('inp');
    const raw = inp.value.trim();
    if (!raw) return;
    raw.split(/\s+/).filter(Boolean).forEach(addWord);
    inp.value = '';
    inp.focus();
  }

  function quickAdd(w) { addWord(w); }

  function addWord(w) {
    const match = getBestMatch(w);
    let hex, label, tagBg, tagText, isFallback = false, isCustom = false;
    if (match) {
      hex = pickHue(match); label = match.label; tagBg = match.tagBg; tagText = match.tagText;
      if (customCategories.find(c => c.label === match.label)) isCustom = true;
    } else {
      const fb = fallbackColor(w); hex = fb.hex; label = fb.label; tagBg = fb.tagBg; tagText = fb.tagText; isFallback = true;
    }
    results.unshift({ word: w, hex, label, tagBg, tagText, id: _id++, isFallback, isCustom });
    render();
  }

  function removeItem(id) {
    const idx = results.findIndex(r => r.id == id);
    if (idx > -1) results.splice(idx, 1);
    render();
  }

  function clearAll() { results.length = 0; render(); }

  function cp(id, btn) {
    const r = results.find(x => x.id == id);
    if (r) copyText(r.hex.toUpperCase(), btn, r.hex.toUpperCase());
  }

  function cpHex(id, el) {
    const r = results.find(x => x.id == id);
    if (r) copyText(r.hex.toUpperCase(), el, r.hex.toUpperCase());
  }

  function render() {
    const pal = document.getElementById('pal');
    const show = results.length ? 'block' : 'none';
    document.getElementById('clearBtn').style.display = show;
    document.getElementById('exportJsonBtn').style.display = show;
    document.getElementById('exportCssBtn').style.display = show;
    if (!results.length) {
      pal.innerHTML = '<div class="empty"><div class="empty-icon">◎</div><p>Type a word above to see its color meaning.<br>Try love, ocean, mystery, or luxury.</p></div>';
      return;
    }
    pal.innerHTML = results.map(r => {
      const id = r.id;
      const defineSection = r.isFallback ? `
        <button class="define-btn" onclick="openDefinePanel(${id})">+ define this word</button>
        <div class="define-panel" id="dp-${id}" style="display:none;">
          <label>what category does "${r.word}" belong to?</label>
          <div class="define-row">
            <input class="define-input" id="di-${id}" type="text" placeholder="e.g. persian words, tech brands..." oninput="updatePreview(${id})" onkeydown="if(event.key==='Enter')confirmCategory(${id})" />
            <div class="define-preview" id="dprev-${id}"></div>
            <button class="define-confirm" id="dconf-${id}" onclick="confirmCategory(${id})" disabled>Save</button>
          </div>
        </div>` : '';
      return `
        <div class="card">
          <div class="swatch" style="background:${r.hex};"></div>
          <div class="card-body">
            <p class="card-word">${r.word}</p>
            <p class="card-hex" onclick="cpHex(${id},this)">${r.hex.toUpperCase()}</p>
            <span class="card-tag" style="background:${r.tagBg};color:${r.tagText};">${r.label}</span>
            ${defineSection}
          </div>
          <div class="card-actions">
            <button class="copy-btn" onclick="cp(${id},this)">${r.hex.toUpperCase()}</button>
            <button class="remove-btn" onclick="removeItem(${id})" title="Remove">×</button>
          </div>
        </div>`;
    }).join('');
  }

  function exportJSON(btn) {
    const data = { colors: {}, customCategories };
    results.forEach(r => { data.colors[r.word] = { hex: r.hex.toUpperCase(), label: r.label, custom: !!r.isCustom }; });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }));
    a.download = 'word-colors.json'; a.click();
    btn.textContent = 'Exported!'; btn.classList.add('ok');
    setTimeout(() => { btn.textContent = 'Export JSON'; btn.classList.remove('ok'); }, 1800);
  }

  function exportCSS(btn) {
    const lines = [':root {'];
    results.forEach(r => { lines.push(`  --color-${r.word.toLowerCase().replace(/[^a-z0-9]/g,'-')}: ${r.hex.toUpperCase()};   /* ${r.label} */`); });
    lines.push('}');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([lines.join('\n')], { type: 'text/css' }));
    a.download = 'word-colors.css'; a.click();
    btn.textContent = 'Exported!'; btn.classList.add('ok');
    setTimeout(() => { btn.textContent = 'Export CSS'; btn.classList.remove('ok'); }, 1800);
  }

  loadCustomCategories();
  renderCustomCats();
  document.getElementById('inp').addEventListener('keydown', e => { if (e.key === 'Enter') go(); });
  render();
</script>
</body>
</html>
